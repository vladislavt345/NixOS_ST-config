# Kitty — Tokyo Night Blue

font_family      JetBrains Mono
font_size        12.0

window_padding_width 10

enable_audio_bell no
confirm_os_window_close 0

# Transparency + blur
background_opacity 0.82
background_blur    32

# Tab bar
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #c0caf5
active_tab_background   #3d59a1
inactive_tab_foreground #565f89
inactive_tab_background #1a1b26
tab_bar_background      #16161e

# Cursor
cursor            #c0caf5
cursor_text_color #1a1b26
cursor_shape      beam

# Selection
selection_foreground #1a1b26
selection_background #7aa2f7

# URL
url_color  #7dcfff
url_style  curly

# --- Tokyo Night Storm palette ---

foreground #c0caf5
background #1a1b26

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta / Purple
