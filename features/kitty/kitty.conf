# Kitty — Transparent SaaS Black & White theme

font_family      JetBrains Mono
font_size        12.0

window_padding_width 8

enable_audio_bell no
confirm_os_window_close 0

# Transparency
background_opacity 0.85

# Colors — soft black & white, not pure #000/#fff
foreground #d4d4d4
background #121212

# Cursor
cursor #d4d4d4
cursor_text_color #121212

# Selection
selection_foreground #121212
selection_background #d4d4d4

# URL
url_color #a0a0a0
url_style curly

# Tab bar
active_tab_foreground   #e0e0e0
active_tab_background   #2a2a2a
inactive_tab_foreground #6a6a6a
inactive_tab_background #181818
tab_bar_background      #0e0e0e
tab_bar_style           powerline

# Black
color0  #1a1a1a
color8  #4a4a4a

# Red (muted warm gray)
color1  #b07070
color9  #c08080

# Green (muted cool gray)
color2  #70b070
color10 #80c080

# Yellow (warm light gray)
color3  #b0a070
color11 #c0b080

# Blue (cool mid gray)
color4  #7090b0
color12 #80a0c0

# Magenta (muted)
color5  #a070a0
color13 #b080b0

# Cyan (cool light)
color6  #70a0a0
color14 #80b0b0

# White
color7  #b0b0b0
color15 #e0e0e0
