# Theme: Transparent SaaS Black & White
# Soft black-white palette with transparency
# Not pure #000/#fff — easier on the eyes

# === Color variables ===
$theme_accent     = rgba(e0e0e0ff)
$theme_accent_dim = rgba(a0a0a0cc)
$theme_border     = rgba(d4d4d4aa)
$theme_border_inactive = rgba(50505066)
$theme_shadow     = rgba(0a0a0a99)

# === General ===
general {
    border_size = 2
    gaps_in = 6
    gaps_out = 14

    col.active_border = $theme_border
    col.inactive_border = $theme_border_inactive
}

# === Decoration ===
decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 0.92
    inactive_opacity = 0.82

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = $theme_shadow
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.15
        new_optimizations = true
    }
}
